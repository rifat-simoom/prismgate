name: Agentic Review

on:
  pull_request:
    types:
      - labeled

permissions:
  contents: read
  pull-requests: write

jobs:
  trigger-agentic-review:
    if: github.event.label.name == 'risk: high'
    runs-on: ubuntu-latest

    steps:
      - name: Ask Copilot for a deeper review
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '@github-copilot review',
                '',
                'This PR is labeled `risk: high`.',
                'Focus on security impact, startup/configuration behavior, migration safety,',
                'backward compatibility, and correctness around auth or domain boundaries.'
              ].join('\n')
            });
