name: Agentic Review

on:
  pull_request:
    types:
      - labeled
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: number

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  trigger-agentic-review:
    if: "${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'risk: high' }}"
    runs-on: ubuntu-latest

    steps:
      - name: Ask Copilot for a deeper review
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        with:
          script: |
            const issueNumber = context.eventName === 'workflow_dispatch'
              ? Number(process.env.PR_NUMBER)
              : context.issue.number;

            const intro = context.eventName === 'workflow_dispatch'
              ? 'This review was triggered manually from GitHub Actions.'
              : 'This PR is labeled `risk: high`.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '@github-copilot review',
                '',
                intro,
                'Focus on security impact, startup/configuration behavior, migration safety,',
                'backward compatibility, and correctness around auth or domain boundaries.'
              ].join('\n')
            });
