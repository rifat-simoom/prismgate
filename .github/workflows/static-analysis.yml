name: Static Analysis

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Sample.sln

      - name: Verify formatting
        run: dotnet format Sample.sln --verify-no-changes --no-restore

      - name: Build with analyzers
        run: dotnet build Sample.sln --configuration Release --no-restore -warnaserror

      - name: Audit NuGet packages
        run: dotnet list Sample.sln package --vulnerable --include-transitive

      - name: Run tests with coverage
        run: >
          dotnet test Sample.sln
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory ./artifacts/test-results

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./artifacts/test-results
