name: Risk Label

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  classify-risk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Classify changed files
        id: risk
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          bash ./scripts/classify-risk.sh >> "$GITHUB_OUTPUT"

      - name: Apply risk label
        uses: actions/github-script@v7
        env:
          RISK_LABEL: ${{ steps.risk.outputs.risk }}
          RISK_REASON: ${{ steps.risk.outputs.reason }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const target = process.env.RISK_LABEL;
            const reason = process.env.RISK_REASON;
            const managed = ['risk: low', 'risk: high'];

            const current = await github.paginate(
              github.rest.issues.listLabelsOnIssue,
              { owner, repo, issue_number, per_page: 100 },
            );

            for (const label of current) {
              if (managed.includes(label.name) && label.name !== target) {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name: label.name,
                }).catch(() => {});
              }
            }

            if (!current.some((label) => label.name === target)) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: [target],
              });
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `## Static Risk Classification\n\n**Label:** ${target}\n**Reason:** ${reason}`,
            });
