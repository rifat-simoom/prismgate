name: Risk Label

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to classify
        required: true
        type: number

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  classify-risk:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve pull request context
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pullNumber = context.eventName === 'workflow_dispatch'
              ? Number(core.getInput('pr_number', { required: true }))
              : context.payload.pull_request.number;

            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
            });

            core.setOutput('pr_number', String(pullRequest.number));
            core.setOutput('base_ref', pullRequest.base.ref);
            core.setOutput('head_ref', pullRequest.head.ref);

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_ref }}

      - name: Fetch base branch
        run: git fetch origin "${{ steps.pr.outputs.base_ref }}"

      - name: Classify changed files
        id: risk
        env:
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
        run: |
          bash ./scripts/classify-risk.sh >> "$GITHUB_OUTPUT"

      - name: Apply risk label
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.pr.outputs.pr_number }}
          RISK_LABEL: ${{ steps.risk.outputs.risk }}
          RISK_REASON: ${{ steps.risk.outputs.reason }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = Number(process.env.ISSUE_NUMBER);
            const target = process.env.RISK_LABEL;
            const reason = process.env.RISK_REASON;
            const managed = ['risk: low', 'risk: high'];

            const current = await github.paginate(
              github.rest.issues.listLabelsOnIssue,
              { owner, repo, issue_number, per_page: 100 },
            );

            for (const label of current) {
              if (managed.includes(label.name) && label.name !== target) {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name: label.name,
                }).catch(() => {});
              }
            }

            if (!current.some((label) => label.name === target)) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: [target],
              });
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `## Static Risk Classification\n\n**Label:** ${target}\n**Reason:** ${reason}`,
            });
